<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/7b892d9a02.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../../../../dist/vertex.css">
    <link rel="stylesheet" href="../../assets/css/docs.css">
    <title>Buttons | Vertex UI v1.0</title>
</head>
<body>
    <!-- Navbar -->
    <div id="navbar"></div>
    <script>
    fetch('../../views/partials/navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar').innerHTML = data;
        }
    );
    </script>

    <div class="vx-container vx-container-2xl">
        <div class="vx-doc-layout">
            <!-- Sidebar -->
            <div id="sidebar"></div>
            <script>
            fetch('../../views/partials/sidebar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('sidebar').innerHTML = data;
                }
            );
            </script>

            <!-- Main content -->
            <div class="vx-doc-content">
                <div class="vx-intro">
                    <h1 class="vx-main-title">
                        Buttons
                    </h1>
                    <p class="vx-main-subtitle"></p>
                </div>

                <!-- Variants -->
                <section class="vx-section-code vx-section-sm" id="variants">
                    <div class="vx-section-header">
                        <h3 class="vx-section-title">Variants</h3>
                    </div>
                    <div class="vx-section-body">
                        <div class="vx-snippet">
                            <div class="vx-preview">
                                <button type="button" class="vx-btn vx-btn-primary">Primary</button>
                                <button type="button" class="vx-btn vx-btn-secondary">Secondary</button>
                                <button type="button" class="vx-btn vx-btn-tertiary">Tertiary</button>
                                <button type="button" class="vx-btn vx-btn-success">Success</button>
                                <button type="button" class="vx-btn vx-btn-warning">Warning</button>
                                <button type="button" class="vx-btn vx-btn-danger">Danger</button>
                                <button type="button" class="vx-btn vx-btn-dark">Dark</button>
                                <button type="button" class="vx-btn vx-btn-light">Light</button>
                            </div>
                            <div class="vx-code" data-copy>
                                <div class="vx-copy-icon" data-copy-icon>
                                    <i class="fa-regular fa-copy"></i>
                                </div>
                                <pre><code data-copy-code></code></pre>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Outlines -->
                <section class="vx-section-code vx-section-sm" id="outlines">
                    <div class="vx-section-header">
                        <h3 class="vx-section-title">Outlines</h3>
                    </div>
                    <div class="vx-section-body">
                        <div class="vx-snippet">
                            <div class="vx-preview">
                                <button type="button" class="vx-btn vx-btn-primary-outline">
                                    Primary
                                </button>
                                <button type="button" class="vx-btn vx-btn-secondary-outline">
                                    Secondary
                                </button>
                                <button type="button" class="vx-btn vx-btn-tertiary-outline">
                                    Tertiary
                                </button>
                                <button type="button" class="vx-btn vx-btn-success-outline">
                                    Success
                                </button>
                                <button type="button" class="vx-btn vx-btn-warning-outline">
                                    Warning
                                </button>
                                <button type="button" class="vx-btn vx-btn-danger-outline">
                                    Danger
                                </button>
                                <button type="button" class="vx-btn vx-btn-dark-outline">
                                    Dark
                                </button>
                                <button type="button" class="vx-btn vx-btn-light-outline">
                                    Light
                                </button>
                            </div>
                            <div class="vx-code" data-copy>
                                <div class="vx-copy-icon" data-copy-icon>
                                    <i class="fa-regular fa-copy"></i>
                                </div>
                                <pre><code data-copy-code></code></pre>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Sizes -->
                <section class="vx-section-code vx-section-sm" id="sizes">
                    <div class="vx-section-header">
                        <h3 class="vx-section-title">Sizes</h3>
                    </div>
                    <div class="vx-section-body">
                        <div class="vx-snippet">
                            <div class="vx-preview">
                                <button type="button" class="vx-btn vx-btn-lg vx-btn-primary">
                                    Large button
                                </button>
                                <button type="button" class="vx-btn vx-btn-sm vx-btn-secondary">
                                    Small button
                                </button>
                            </div>
                            <div class="vx-code" data-copy>
                                <div class="vx-copy-icon" data-copy-icon>
                                    <i class="fa-regular fa-copy"></i>
                                </div>
                                <pre><code data-copy-code></code></pre>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <footer class="vx-footer">
        <div class="vx-container-fluid">
            &copy; All rights reserved. <br>
            Designed and created using <strong>Vertex UI</strong>, by Azhar Ali
        </div>
    </footer>

    <script src="../../assets/js/vertex.js"></script>
</body>
</html>
